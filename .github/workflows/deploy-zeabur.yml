name: Deploy to Zeabur

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - backend
          - signal-tracker
          - all
      environment:
        description: 'Environment'
        required: true
        type: choice
        default: 'production'
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  deploy-backend:
    if: github.event.inputs.service == 'backend' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zeabur CLI
        run: |
          npm install -g zeabur-cli

      - name: Deploy to Zeabur
        run: |
          zeabur deploy \
            --project ${{ secrets.ZEABUR_PROJECT_ID }} \
            --service backend \
            --template infrastructure/backend.yaml
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}

  deploy-signal-tracker:
    if: github.event.inputs.service == 'signal-tracker' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zeabur CLI
        run: |
          npm install -g zeabur-cli

      - name: Deploy to Zeabur
        run: |
          zeabur deploy \
            --project ${{ secrets.ZEABUR_PROJECT_ID }} \
            --service signal-tracker \
            --template infrastructure/signal-tracker.yaml
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
