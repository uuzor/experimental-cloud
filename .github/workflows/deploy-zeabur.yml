name: Deploy to Zeabur

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - backend
          - signal-tracker
          - all
      environment:
        description: 'Environment'
        required: true
        type: choice
        default: 'production'
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  ZEABUR_API_KEY: ${{ secrets.ZEABUR_API_KEY }}
  # Service IDs for redeploy (update these when creating new services)
  BACKEND_SERVICE_ID: 6a490be05b59c97aa606f3f9

jobs:
  deploy-backend:
    if: github.event.inputs.service == 'backend' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend
        run: |
          npx zeabur@latest auth login --token $ZEABUR_API_KEY
          cd backend
          npx zeabur@latest deploy --project-id 6a4818d24f8d7c7234e5cbb2 --service-id ${{ env.BACKEND_SERVICE_ID }} --name backend --json

  deploy-signal-tracker:
    if: github.event.inputs.service == 'signal-tracker' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy signal-tracker
        run: |
          npx zeabur@latest auth login --token $ZEABUR_API_KEY
          cd signal-tracker
          npx zeabur@latest deploy --project-id 6a4818d24f8d7c7234e5cbb2 --name signal-tracker --json
