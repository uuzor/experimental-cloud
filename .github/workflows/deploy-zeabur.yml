name: Deploy to Zeabur

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - backend
          - signal-tracker
          - all
      environment:
        description: 'Environment'
        required: true
        type: choice
        default: 'production'
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  deploy-backend:
    if: github.event.inputs.service == 'backend' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Deploy via Zeabur GraphQL API
        run: |
          # Get project and service info
          curl -s -X POST 'https://api.zeabur.com/graphql' \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.ZEABUR_TOKEN }}' \
            -d '{"query":"{ viewer { projects { edges { node { id name services { edges { node { id name } } } } } } } }"}' | jq .

  deploy-signal-tracker:
    if: github.event.inputs.service == 'signal-tracker' || github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Deploy via Zeabur GraphQL API
        run: |
          curl -s -X POST 'https://api.zeabur.com/graphql' \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.ZEABUR_TOKEN }}' \
            -d '{"query":"{ viewer { projects { edges { node { id name services { edges { node { id name } } } } } } } }"}' | jq .
