# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: AI Copy-Trading Signal Tracker
spec:
    description: Monitors Hyperliquid wallets and emits trading signals via Redis
    icon: https://cdn.zeabur.com/marketplace/nodejs.svg
    tags:
        - Trading
        - Signals
    services:
        - name: signal-tracker
          template: PREBUILT_V2
          spec:
            source:
                image: ghcr.io/uuzor/experimental-cloud/signal-tracker:latest
                command:
                    - node
                    - dist/index.js
            ports:
                - id: web
                  port: 3001
                  type: HTTP
                  domainKey: PUBLIC_DOMAIN
            dependencies:
                - redis
            env:
                NODE_ENV:
                    default: production
                PORT:
                    default: "3001"
                REDIS_URL:
                    default: ${REDIS_URL}
                BACKEND_URL:
                    default: http://backend:3000
                # Hyperliquid Configuration
                HYPERLIQUID_NETWORK:
                    default: testnet
                # Polling Configuration
                POLL_INTERVAL_MS:
                    default: "10000"
                # Tracked Traders (comma-separated wallet addresses)
                # Add your tracked trader addresses here
                TRACKED_TRADERS:
                    default: ""
