# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: AI Copy-Trading Backend
spec:
    description: Backend API for AI Copy-Trading Platform - Auth, Execution Agent management, Telemetry
    icon: https://cdn.zeabur.com/marketplace/fastify.svg
    tags:
        - Trading
        - API
    services:
        - name: backend
          template: PREBUILT_V2
          spec:
            source:
                image: ghcr.io/uuzor/experimental-cloud/backend:latest
                command:
                    - node
                    - dist/server.js
            ports:
                - id: web
                  port: 3000
                  type: HTTP
                  domainKey: PUBLIC_DOMAIN
            dependencies:
                - postgresql
                - redis
            env:
                NODE_ENV:
                    default: production
                PORT:
                    default: "3000"
                DATABASE_URL:
                    default: ${POSTGRES_CONNECTION_STRING}
                JWT_SECRET:
                    default: ${PASSWORD}
                JWT_EXPIRES_IN:
                    default: 7d
                PLATFORM_API_KEY:
                    default: ${PASSWORD}
                REDIS_URL:
                    default: ${REDIS_URL}
                BACKEND_URL:
                    default: https://${PUBLIC_DOMAIN}
                EXECUTION_AGENT_IMAGE:
                    default: ghcr.io/uuzor/experimental-cloud/execution-agent:latest
