# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
    name: AI Copy-Trading Backend
spec:
    description: Backend API for AI Copy-Trading Platform - Auth, Execution Agent management, Telemetry
    icon: https://cdn.zeabur.com/marketplace/fastify.svg
    tags:
        - Trading
        - API
    readme: |
        # AI Copy-Trading Backend

        Fastify + TypeScript backend API for the AI Copy-Trading Signal Platform.

        ## Features

        - User authentication (JWT)
        - Execution agent management
        - Internal telemetry endpoints
        - Audit logging

        ## Configuration

        - `DATABASE_URL` - PostgreSQL connection string
        - `JWT_SECRET` - JWT signing secret
        - `PLATFORM_API_KEY` - Internal API key for agent provisioning
    services:
        - name: backend
          template: PREBUILT_V2
          spec:
            source:
                image: ghcr.io/your-org/ai-copytrading-backend:latest
                command:
                    - node
                    - dist/server.js
            ports:
                - id: web
                  port: 3000
                  type: HTTP
                  domainKey: PUBLIC_DOMAIN
            dependencies:
                - postgresql
                - redis
            env:
                NODE_ENV:
                    default: production
                    expose: false
                PORT:
                    default: "3000"
                    expose: false
                DATABASE_URL:
                    default: ${POSTGRES_CONNECTION_STRING}
                    expose: false
                JWT_SECRET:
                    default: ${PASSWORD}
                    expose: false
                JWT_EXPIRES_IN:
                    default: 7d
                    expose: false
                PLATFORM_API_KEY:
                    default: ${PASSWORD}
                    expose: false
                REDIS_URL:
                    default: ${REDIS_URL}
                    expose: false